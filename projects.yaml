configuration:
  min_stars: 0
  min_projectrank: 0
  require_github: True
  allowed_licenses: ["all"]
  hide_project_license: True
  markdown_header_file: "config/header.md"
  markdown_footer_file: "config/footer.md"
  projects_history_folder: "history"

categories:
  - category: "full-stack-coding"
    title: "Full-stack and long-running coding harnesses"
    subtitle: "Spec-driven, multi-session, repo-scoped coding harnesses (e.g. GSD, Claude Agent SDK, OpenCode)."
  - category: "frameworks"
    title: "Frameworks"
    subtitle: "General-purpose agent and LLM application frameworks (distinct from harnesses: they are the app layer)."
  - category: "multi-agent"
    title: "Multi-agent and orchestration"
    subtitle: "Harnesses and patterns for multi-agent coordination, handoffs, and orchestration."
  - category: "plugins-mcp-cli"
    title: "Plugins, MCPs, CLI tools"
    subtitle: "IDE plugins, specific MCP servers, and CLI tools that give agents tools and context."
  - category: "evaluation"
    title: "Evaluation and benchmarking harnesses"
    subtitle: "Agentic eval systems, reasoning benchmarks (e.g. ARC-AGI), and open agent benchmarks."
  - category: "research-task"
    title: "Research and task-specific harnesses"
    subtitle: "Deep research, document QA, and domain-specific agent loops."
  - category: "libraries-sdks"
    title: "Libraries and SDKs"
    subtitle: "Lightweight agent runtimes, tool loops, and provider-agnostic harness primitives."

labels:
  - label: "python"
    image: "https://www.python.org/static/favicon.ico"
    description: "Python-based"
  - label: "javascript"
    image: "https://cdn.icon-icons.com/icons2/2108/PNG/512/javascript_icon_130900.png"
    description: "JavaScript/TypeScript-based"

