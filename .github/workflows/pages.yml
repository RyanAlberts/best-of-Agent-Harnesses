name: Deploy Pages site

# Builds the static site (scripts/build_site.py) from harnesses.json + the
# comparison docs and deploys it to GitHub Pages. Self-enables Pages on first
# run via actions/configure-pages (enablement: true).

on:
  push:
    branches: [main]
    paths:
      - harnesses.json
      - harnesses.jsonld
      - llms.txt
      - feed.json
      - comparisons/**
      - assets/**
      - scripts/build_site.py
      - scripts/generate.py
      - .github/workflows/pages.yml
  # weekly-rescore pushes with GITHUB_TOKEN, and GitHub never fires on:push
  # workflows for token-initiated pushes — chain off the completed run instead.
  workflow_run:
    workflows: [weekly-rescore]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install markdown
      - run: python3 scripts/build_site.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
