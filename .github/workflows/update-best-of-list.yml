# Based on https://github.com/best-of-lists/best-of-update-action/blob/v0.8.5/workflows/update-best-of-list.yml
# Scheduled runs disabled: list is maintained manually in Cursor to preserve custom intro and Simplicity ↔ capability column.
name: update-best-of-list

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to use for this update"
        required: false
  # schedule:
  #   - cron: "0 18 * * 4" # Every thursday at 6pm — DISABLED
env:
  BRANCH_PREFIX: "update/"
  DEFAULT_BRANCH: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-best-of-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: set-version-from-input
        if: ${{ github.event.inputs != null && github.event.inputs.version != null && github.event.inputs.version != '' }}
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: echo "VERSION=$INPUT_VERSION" >> "$GITHUB_ENV"
      - name: set-version-via-date
        if: ${{ ! (env.VERSION != null && env.VERSION != '') }}
        run: echo "VERSION=$(date '+%Y.%m.%d')" >> "$GITHUB_ENV"
      - uses: actions/checkout@v7
      - name: check-version-tag
        shell: bash
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          git fetch --tags --force
          if git show-ref --tags --verify --quiet -- "refs/tags/$VERSION"; then
            echo "VERSION=$(date '+%Y.%m.%d-%H.%M')" >> "$GITHUB_ENV"
          fi
      - name: create-update-branch
        uses: peterjgrainger/action-create-branch@v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: "${{ env.BRANCH_PREFIX }}${{ env.VERSION }}"
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH_PREFIX }}${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: update-best-of-list
        uses: best-of-lists/best-of-update-action@v0.8.5
        with:
          libraries_key: ${{ secrets.LIBRARIES_KEY }}
          github_key: ${{ secrets.GITHUB_TOKEN }}
      - name: push-update
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ env.BRANCH_PREFIX }}${{ env.VERSION }}
          commit_user_name: best-of update
          commit_user_email: actions@github.com
          commit_message: Update best-of list for version ${{ env.VERSION }}
          tagging_message: ${{ env.VERSION }}
          skip_dirty_check: true
          commit_options: "--allow-empty"
      - name: create-pull-request
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE: ${{ env.DEFAULT_BRANCH }}
          HEAD: ${{ env.BRANCH_PREFIX }}${{ env.VERSION }}
          VERSION: ${{ env.VERSION }}
        run: |
          set -e
          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "Best-of update: $VERSION" \
            --body "To finish this update: select **Merge pull request** below and **Confirm merge**. Also publish the created draft release in the [releases section](../releases)." \
            || true
      - name: create-release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          name: "Update: ${{ env.VERSION }}"
          body_path: "latest-changes.md"
          draft: true
          prerelease: false
